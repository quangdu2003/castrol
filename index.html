<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của bạn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f9;
        }

        .btn-castrol {
            background-color: #00882B; /* Màu xanh Castrol */
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn-castrol:hover {
            background-color: #006620;
            transform: translateY(-2px);
        }

        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }                        
    </style>
</head>
<body>
<iframe 
    src="https://api.allorigins.win/raw?url=https://www.castrol.com/en_us/united-states/home/product-finder.html" 
    width="100%" 
    height="800px" 
    style="border: none;">
</iframe>
   

</body>
</html>
