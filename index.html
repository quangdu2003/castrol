<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Tra cứu Dầu nhớt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 20px;
        }

        /* Tạo một khung trông giống hệt iframe */
        .fake-iframe {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            margin: 0 auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            /* Gọi bức ảnh bạn đã chụp lên làm nền */
            background-image: url('castrol-bg.jpg'); 
            background-size: cover;
            background-position: top center;
            cursor: pointer;
        }

        /* Tạo lớp phủ mờ mờ và nút bấm ảo ở giữa khung */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4); /* Làm tối ảnh nền một chút */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .fake-iframe:hover .overlay {
            background-color: rgba(0, 0, 0, 0.2);
        }

        .btn-fake {
            background-color: #00882B;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h2>Tìm Kiếm Dầu Nhớt Castrol Chính Hãng</h2>
    
   <a href="https://www.castrol.com/en_us/united-states/home/product-finder.html" style="text-decoration: none;">
        <div class="fake-iframe">
            <div class="overlay">
                <span class="btn-fake">Bấm vào đây để bắt đầu tra cứu</span>
            </div>
        </div>
    </a>

</body>
</html>
